name: Ultra-Cloner Build Pipeline
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Cloner Engine
        run: |
          python3 cloner.py --test-mode

      - name: Upload Finished Clone
        uses: actions/upload-artifact@v3
        with:
          name: Ultra-Cloned-App
          path: data/output/*.apk
