name: Ultra-Cloner Build Pipeline
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool zipalign

      - name: Run Build Test
        run: |
          python3 cloner.py --test-mode
