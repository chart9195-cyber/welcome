name: Ultra-Cloner Build Pipeline
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloner Engine
        run: python3 cloner.py test_target.apk

      - name: Upload Clone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cloned-Result
          path: data/output/*.apk
          if-no-files-found: warn
