name: GSM Core – Create Number + SMS Reception

on:
  workflow_dispatch:
    inputs:
      msisdn:
        description: 'Phone number (leave empty to auto‑generate)'
        required: false
        default: ''

jobs:
  create-sim:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Load SCTP kernel module
        run: |
          sudo modprobe sctp
          lsmod | grep sctp

      - name: Install all required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool libtalloc-dev libsctp-dev shtool \
            autoconf automake git pkg-config make gcc \
            libgnutls28-dev libusb-1.0.0-dev libmnl-dev liburing-dev \
            libpcsclite-dev libortp-dev \
            libdbi-dev \
            osmo-mgw \
            telnet netcat-openbsd
          echo "All packages installed (osmo-mgw + libdbi-dev for openbsc)"

      - name: Build libosmocore into isolated prefix
        run: |
          git clone https://gitea.osmocom.org/osmocom/libosmocore
          cd libosmocore
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          echo "libosmocore installed"

      - name: Build libosmo-gprs into isolated prefix
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/osmocom/libosmo-gprs
          cd libosmo-gprs
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          echo "libosmo-gprs installed"

      - name: Build libosmo-netif into isolated prefix
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/osmocom/libosmo-netif
          cd libosmo-netif
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          echo "libosmo-netif installed"

      - name: Build libosmo-abis (tag 2.1.0) into isolated prefix
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/osmocom/libosmo-abis
          cd libosmo-abis
          git checkout 2.1.0 || { echo "Failed to checkout libosmo-abis 2.1.0"; exit 1; }
          autoreconf -fi
          ./configure --prefix=/opt/osmocom --disable-dahdi
          make -j$(nproc)
          sudo make install
          echo "libosmo-abis 2.1.0 installed"

      - name: Build libosmo-sigtran (2.2.0) into isolated prefix
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/osmocom/libosmo-sigtran
          cd libosmo-sigtran
          git checkout 2.2.0 || { echo "Failed to checkout libosmo-sigtran 2.2.0"; exit 1; }
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          echo "libosmo-sigtran 2.2.0 installed"

      - name: Build osmo-mgw (master) for libosmo-mgcp-client with fmtp support
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/cellular-infrastructure/osmo-mgw
          cd osmo-mgw
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          echo "osmo-mgw (libosmo-mgcp-client) master installed"

      - name: Build osmo-bts from source (TRX only, tag 1.9.0)
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          git clone https://gitea.osmocom.org/cellular-infrastructure/osmo-bts
          cd osmo-bts
          git checkout 1.9.0 || { echo "Failed to checkout osmo-bts 1.9.0"; exit 1; }
          autoreconf -fi
          ./configure --prefix=/opt/osmocom --enable-trx --disable-dahdi --disable-ortp --disable-sysmbts
          make -j$(nproc)
          sudo make install
          ls /opt/osmocom/bin/osmo-bts-trx

      - name: Build osmocom-nitb from source (openbsc/openbsc subdirectory, deprecated warnings allowed)
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          export CFLAGS="-Wno-error=deprecated-declarations -Wno-error=discarded-qualifiers -Wno-error=unused-variable"
          git clone https://gitea.osmocom.org/cellular-infrastructure/openbsc
          cd openbsc/openbsc
          # Remove local struct sdp_firmware definition to avoid redefinition with libosmo-abis >= 2.0.0
          sed -i '/^struct sdp_firmware {$/,/^};$/d' src/libbsc/abis_nm.c
          autoreconf -fi
          ./configure --prefix=/opt/osmocom
          make -j$(nproc)
          sudo make install
          ls /opt/osmocom/bin/osmo-nitb
          echo "osmo-nitb installed"

      - name: Configure and launch osmocom-nitb (all-in-one, no MSC/HLR/STP)
        run: |
          sudo mkdir -p /tmp/nitb /var/lib/osmocom
          sudo tee /tmp/nitb/osmo-nitb.cfg << 'CFG'
          !
          line vty
           no login
          !
          log stderr
           logging filter all 1
           logging color 1
           logging print category 0
           logging timestamp 0
          !
          e1_input
           e1_line 0 driver ipa
           ipa bind 127.0.0.1
          !
          network
           network country code 001
           mobile network code 01
           short name PhantomLink
           long name PhantomLink
           encryption a5 0
           bts 0
            type nanobts
            band 1800
            cell_identity 0
            location_area_code 1
            base_station_id_code 63
            ip.access unit_id 1234 0
            oml ip.access stream_id 255 line 0
            trx 0
             arfcn 512
             nominal power 23
             max_power_red 20
             rsl e1 tei 0
             timeslot 0
              phys_chan_config CCCH+SDCCH4
             timeslot 1
              phys_chan_config TCH/F_TCH/H_SDCCH8_PDCH
          !
          msc
           mgw remote-ip 127.0.0.1
          !
          CFG
          cat > /tmp/run-nitb.sh << 'SCRIPT'
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/osmocom/lib
          exec /opt/osmocom/bin/osmo-nitb "$@"
          SCRIPT
          chmod +x /tmp/run-nitb.sh
          sudo /tmp/run-nitb.sh -c /tmp/nitb/osmo-nitb.cfg > /tmp/nitb.log 2>&1 &
          sleep 3
          pgrep -x osmo-nitb && echo "NITB running" || { echo "NITB not running"; cat /tmp/nitb.log; }

      - name: Check if NITB is listening on OML port 3002
        run: |
          sleep 2
          echo "=== ss -tlnp | grep 3002 ==="
          sudo ss -tlnp | grep 3002 || echo "Port 3002 NOT listening"
          echo ""
          echo "=== ss -tlnp | grep 3003 ==="
          sudo ss -tlnp | grep 3003 || echo "Port 3003 NOT listening"

      - name: Clone OsmocomBB
        run: |
          git clone https://gitea.osmocom.org/phone-side/osmocom-bb
          echo "OsmocomBB cloned"

      - name: Build OsmocomBB host programs
        run: |
          export PKG_CONFIG_PATH=/opt/osmocom/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          cd osmocom-bb/src/host/layer23
          ls configure.ac
          autoreconf -fi
          ./configure
          make -j$(nproc)
          echo "Host programs built"
          ls src/mobile/mobile

      - name: Launch FakeTRX FIRST (before osmo-bts-trx)
        run: |
          cd osmocom-bb/src/target/trx_toolkit
          python3 fake_trx.py > /tmp/faketrx.log 2>&1 &
          sleep 2
          echo "FakeTRX launched"

      - name: Launch osmo-bts-trx (wrapper script) with matching unit-id
        run: |
          sudo mkdir -p /tmp/bts
          sudo tee /tmp/bts/osmo-bts.cfg << 'CFG'
          !
          line vty
           no login
          !
          phy 0
           osmotrx ip 127.0.0.1
           osmotrx fn-advance 20
           osmotrx rts-advance 5
           instance 0
          !
          bts 0
           band 1800
           ipa unit-id 1234 0
           oml remote-ip 127.0.0.1
           rtp jitter-buffer 0
           paging queue-size 200
           paging lifetime 0
           trx 0
            phy 0 instance 0
          !
          CFG
          cat > /tmp/run-bts.sh << 'SCRIPT'
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/osmocom/lib
          exec /opt/osmocom/bin/osmo-bts-trx "$@"
          SCRIPT
          chmod +x /tmp/run-bts.sh
          sudo /tmp/run-bts.sh -c /tmp/bts/osmo-bts.cfg > /tmp/bts.log 2>&1 &
          sleep 3
          pgrep -x osmo-bts-trx && echo "BTS running" || { echo "BTS not running"; cat /tmp/bts.log; }

      - name: Generate subscriber identity (13-digit Nigerian number)
        id: identity
        run: |
          PREFIXES=(70 71 80 81 90 91)
          PREFIX=${PREFIXES[$RANDOM % ${#PREFIXES[@]}]}
          LOCAL="${PREFIX}$(shuf -i 10000000-99999999 -n 1)"
          MSISDN="234${LOCAL}"
          IMSI="001010$(shuf -i 1000000000-9999999999 -n 1)"
          echo "msisdn=$MSISDN" >> $GITHUB_OUTPUT
          echo "imsi=$IMSI" >> $GITHUB_OUTPUT
          echo "Identity: +$MSISDN (IMSI: $IMSI)"

      - name: Create subscriber via NITB VTY
        run: |
          echo -e "enable\nsubscriber imsi $IMSI create\nsubscriber imsi $IMSI update msisdn $MSISDN" \
            | timeout 10 telnet 127.0.0.1 4242 2>/dev/null || true
          echo "Subscriber created via NITB VTY"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}

      - name: Launch mobile with minimal config
        run: |
          mkdir -p /tmp/mobile
          cat > /tmp/mobile/mobile.cfg << 'CFG'
          !
          line vty
           no login
          !
          ms 1
           layer2-socket /tmp/osmocom_l2
           sap-socket /tmp/osmocom_sap
          !
          CFG
          export LD_LIBRARY_PATH=/opt/osmocom/lib:$LD_LIBRARY_PATH
          cd osmocom-bb/src/host/layer23/src/mobile
          ./mobile -c /tmp/mobile/mobile.cfg > /tmp/mobile.log 2>&1 &
          sleep 4
          pgrep -x mobile && echo "Mobile running" || echo "Mobile not running"

      - name: Configure SIM and network via VTY at runtime
        run: |
          sleep 3
          echo -e "enable\nconfigure terminal\nms 1\nsim test\ntest-sim imsi $IMSI ki comp128 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00\nnetwork-selection-mode auto\nrplmn 001 01\nexit\nno shutdown" \
            | timeout 10 telnet 127.0.0.1 4247 2>/dev/null || true
          echo "VTY runtime configuration attempted"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}

      - name: Send test SMS via NITB VTY
        run: |
          sleep 6
          echo -e "enable\nsubscriber extension $MSISDN sms sender extension $MSISDN send test\n" \
            | timeout 10 telnet 127.0.0.1 4242 2>/dev/null || true
          echo "Test SMS sent via NITB"
          echo "=== Mobile log (last 30 lines) ==="
          tail -30 /tmp/mobile.log || true
          echo ""
          echo "=== NITB log (last 15 lines) ==="
          tail -15 /tmp/nitb.log || true
          echo ""
          echo "=== BTS log (last 10 lines) ==="
          tail -10 /tmp/bts.log || true
        env:
          MSISDN: ${{ steps.identity.outputs.msisdn }}

      - name: Output subscriber credentials
        run: |
          echo "======================================================"
          echo "  PHANTOMLINK GSM CORE - NUMBER CREATED"
          echo "======================================================"
          echo "  Phone Number: +$MSISDN"
          echo "  IMSI:         $IMSI"
          echo "  Country:       Nigeria (+234)"
          echo "======================================================"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}

      - name: Push to PhantomLink subscriber panel
        run: |
          curl -s -X POST https://oga1234-phantomlink-gsm.hf.space/api/subscriber/create \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -d "{\"imsi\":\"$IMSI\",\"msisdn\":\"$MSISDN\"}"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}
