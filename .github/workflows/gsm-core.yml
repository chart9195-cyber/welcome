name: GSM Core – Create Number + Virtual SIM

on:
  workflow_dispatch:
    inputs:
      msisdn:
        description: 'Phone number (leave empty to auto‑generate)'
        required: false
        default: ''
      country_code:
        description: 'Country code for auto‑generation (e.g. 234)'
        required: false
        default: '234'

jobs:
  create-number:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Osmocom from Ubuntu universe
        run: |
          sudo apt-get update
          sudo apt-get install -y telnet sqlite3 osmo-hlr osmo-msc osmo-stp osmo-mgw
          # Verify all packages installed correctly
          which osmo-hlr && which osmo-msc && which osmo-stp && which osmo-mgw
          echo "All Osmocom packages installed successfully"

      - name: Initialize HLR database with proper schema
        run: |
          sudo mkdir -p /var/lib/osmocom /etc/osmocom
          
          # Check if the hlr.sql schema file exists (it ships with the Ubuntu package)
          if [ -f /usr/share/doc/osmo-hlr/hlr.sql ]; then
            echo "Found hlr.sql schema file"
            sudo sqlite3 /var/lib/osmocom/hlr.db < /usr/share/doc/osmo-hlr/hlr.sql
            echo "Database initialized from hlr.sql"
          elif [ -f /usr/share/doc/osmo-hlr/examples/osmo-hlr-db.sql ]; then
            sudo sqlite3 /var/lib/osmocom/hlr.db < /usr/share/doc/osmo-hlr/examples/osmo-hlr-db.sql
            echo "Database initialized from osmo-hlr-db.sql"
          else
            # Last resort: use osmo-hlr-db-tool
            sudo osmo-hlr-db-tool -l /var/lib/osmocom/hlr.db create 2>/dev/null || {
              # Manual schema as final fallback
              sudo sqlite3 /var/lib/osmocom/hlr.db "CREATE TABLE IF NOT EXISTS subscriber (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                imsi TEXT UNIQUE NOT NULL,
                msisdn TEXT,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );"
              echo "Database created with manual fallback schema"
            }
          fi
          
          # Verify the database exists and has tables
          sudo sqlite3 /var/lib/osmocom/hlr.db ".tables"
          echo "Database verification complete"

      - name: Configure Osmocom
        run: |
          sudo tee /etc/osmocom/osmo-stp.cfg << 'CFG'
          line vty
           no login
          cs7 instance 0
           xua rkm routing-key-allocation dynamic-permitted
           listen m3ua 2905
           accept-asp-connections dynamic-permitted
          CFG

          sudo tee /etc/osmocom/osmo-hlr.cfg << 'CFG'
          line vty
           no login
           bind 0.0.0.0
          hlr
           database /var/lib/osmocom/hlr.db
           subscriber-create-on-demand 2
           gsup
            bind ip 127.0.0.1
          ctrl
           bind 127.0.0.1
          CFG

          sudo tee /etc/osmocom/osmo-msc.cfg << 'CFG'
          line vty
           no login
           bind 0.0.0.0
          network
           network country code 001
           mobile network code 01
           short name OsmoMSC
           long name OsmoMSC
           encryption a5 0
           authentication optional
          msc
           mgw remote-ip 127.0.0.1
           hlr
            remote-ip 127.0.0.1
            remote-port 4222
          CFG

          sudo tee /etc/osmocom/osmo-mgw.cfg << 'CFG'
          line vty
           no login
          mgcp
           bind ip 127.0.0.1
           bind port 2427
           rtp port-range 4002 16000
           rtp bind-ip 127.0.0.1
           number endpoints 31
          CFG
          echo "Configuration files written"

      - name: Start Osmocom daemons with correct startup order
        run: |
          echo "Starting osmo-stp (signaling backbone)..."
          sudo osmo-stp -c /etc/osmocom/osmo-stp.cfg > /tmp/stp.log 2>&1 &
          sleep 3
          if ps aux | grep -v grep | grep osmo-stp; then echo "STP running"; else echo "STP FAILED"; cat /tmp/stp.log; fi
          
          echo "Starting osmo-hlr (home location register)..."
          sudo osmo-hlr -c /etc/osmocom/osmo-hlr.cfg > /tmp/hlr.log 2>&1 &
          sleep 3
          if ps aux | grep -v grep | grep osmo-hlr; then echo "HLR running"; else echo "HLR FAILED"; cat /tmp/hlr.log; fi
          
          echo "Starting osmo-mgw (media gateway)..."
          sudo osmo-mgw -c /etc/osmocom/osmo-mgw.cfg > /tmp/mgw.log 2>&1 &
          sleep 3
          
          echo "Starting osmo-msc (mobile switching center)..."
          sudo osmo-msc -c /etc/osmocom/osmo-msc.cfg > /tmp/msc.log 2>&1 &
          sleep 5
          
          echo "=== Daemon Status ==="
          ps aux | grep osmo
          echo "=== VTY Test ==="
          echo "enable" | timeout 5 telnet 127.0.0.1 4258 2>/dev/null && echo "VTY OK" || echo "VTY not ready yet"

      - name: Create subscriber
        id: create
        run: |
          if [ -z "$MSISDN" ]; then
            MSISDN="$COUNTRY_CODE$(printf '%08d' $RANDOM)"
          fi
          IMSI="001010$(printf '%010d' $RANDOM)"
          
          echo -e "enable\nsubscriber imsi $IMSI create\nupdate subscriber imsi $IMSI set msisdn $MSISDN" \
            | timeout 10 telnet 127.0.0.1 4258 2>&1
          
          echo "imsi=$IMSI" >> $GITHUB_OUTPUT
          echo "msisdn=$MSISDN" >> $GITHUB_OUTPUT
          
          echo "✅ Number created: +$MSISDN (IMSI: $IMSI)"
        env:
          MSISDN: ${{ inputs.msisdn }}
          COUNTRY_CODE: ${{ inputs.country_code }}

      - name: Push to PhantomLink subscriber panel
        run: |
          curl -s -X POST https://oga1234-phantomlink-gsm.hf.space/api/subscriber/create \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -d "{\"imsi\":\"$IMSI\",\"msisdn\":\"$MSISDN\"}"
        env:
          IMSI: ${{ steps.create.outputs.imsi }}
          MSISDN: ${{ steps.create.outputs.msisdn }}
