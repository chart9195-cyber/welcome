name: Virtual SIM – Create Number + SIM Profile

on:
  workflow_dispatch:
    inputs:
      msisdn:
        description: 'Phone number (leave empty to auto‑generate)'
        required: false
        default: ''
      country_code:
        description: 'Country code (e.g. 234 for Nigeria)'
        required: false
        default: '234'

jobs:
  create-sim:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies (all from Ubuntu universe)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc pkg-config \
            libpcsclite-dev libpcsclite1 pcscd pcsc-tools \
            libssl-dev uuid-dev git telnet

      - name: Clone SIMurai with all submodules
        run: |
          git clone --recurse-submodules https://github.com/tomasz-lisowski/simurai.git
          echo "SIMurai cloned successfully"
          ls -la simurai/

      - name: Build swICC (Smart Card Core)
        run: |
          cd simurai/swicc
          make
          echo "swICC built successfully"
          ls -la *.so *.a 2>/dev/null || echo "Libraries built"

      - name: Build swICC-pcsc (Virtual PC/SC Reader)
        run: |
          cd simurai/swicc-pcsc
          make main-dbg
          echo "swICC-pcsc built successfully"
          ls -la main-dbg

      - name: Build swSIM (SIM Card Emulator)
        run: |
          cd simurai/swsim
          mkdir -p build && cd build
          # Fix: remove -Werror to prevent GCC 14 build failure
          cp ../CMakeLists.txt ../CMakeLists.txt.bak
          sed -i 's/-Werror//g' ../CMakeLists.txt
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          make -j$(nproc)
          echo "swSIM built successfully"
          ls -la swsim.elf

      - name: Generate subscriber identity
        id: identity
        run: |
          if [ -z "$MSISDN" ]; then
            MSISDN="$COUNTRY_CODE$(printf '%08d' $RANDOM)"
          fi
          IMSI="001010$(printf '%010d' $RANDOM)"
          ICCID="988812$(printf '%014d' $RANDOM)"
          
          echo "imsi=$IMSI" >> $GITHUB_OUTPUT
          echo "msisdn=$MSISDN" >> $GITHUB_OUTPUT
          echo "iccid=$ICCID" >> $GITHUB_OUTPUT
          
          echo "✅ Identity generated: +$MSISDN (IMSI: $IMSI)"

      - name: Create custom USIM JSON profile
        run: |
          cat > /tmp/usim.json << JSON
          {
            "iccid": "$ICCID",
            "imsi": "$IMSI",
            "msisdn": "$MSISDN",
            "pin": {"value": "1234", "retry_counter": 3},
            "puk": {"value": "87654321", "retry_counter": 10}
          }
          JSON
          sed -i "s/\$ICCID/$ICCID/" /tmp/usim.json
          sed -i "s/\$IMSI/$IMSI/" /tmp/usim.json
          sed -i "s/\$MSISDN/$MSISDN/" /tmp/usim.json
          
          echo "Custom SIM profile created:"
          cat /tmp/usim.json
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}
          ICCID: ${{ steps.identity.outputs.iccid }}

      - name: Launch virtual SIM and verify
        run: |
          # Kill any existing pcscd
          sudo pkill -x pcscd 2>/dev/null || true
          sleep 1
          
          # Start pcscd in foreground debug mode
          sudo pcscd -f -d &
          sleep 3
          
          # Launch swSIM
          cd simurai/swsim/build
          ./swsim.elf --ip 0.0.0.0 --port 37324 \
            --fs /tmp/sim-filesystem.swiccfs \
            --fs-gen /tmp/usim.json &
          sleep 3
          
          # Verify the virtual SIM is visible
          echo "=== PC/SC Scan ==="
          timeout 10 pcsc_scan || true
          
          echo "=== Daemon Status ==="
          ps aux | grep -E "pcscd|swsim" | grep -v grep
          
          echo "✅ Virtual SIM launched with MSISDN: $MSISDN"
        env:
          MSISDN: ${{ steps.identity.outputs.msisdn }}

      - name: Push to PhantomLink subscriber panel
        run: |
          curl -s -X POST https://oga1234-phantomlink-gsm.hf.space/api/subscriber/create \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -d "{\"imsi\":\"$IMSI\",\"msisdn\":\"$MSISDN\"}"
          echo "Pushed to subscriber panel"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}
