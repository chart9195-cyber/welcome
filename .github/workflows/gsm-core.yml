name: Virtual SIM – Create Number + SIM Profile

on:
  workflow_dispatch:
    inputs:
      msisdn:
        description: 'Phone number (leave empty to auto‑generate)'
        required: false
        default: ''

jobs:
  create-sim:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc make pkg-config \
            libpcsclite-dev libpcsclite1 pcscd pcsc-tools \
            libssl-dev uuid-dev git

      - name: Clone SIMurai with all submodules
        run: |
          git clone --recurse-submodules https://github.com/tomasz-lisowski/simurai.git

      - name: Build swICC (Smart Card Core)
        run: |
          cd simurai/swicc
          sed -i 's/-Werror//g' Makefile 2>/dev/null || true
          make

      - name: Build swICC-pcsc (Virtual PC/SC Reader)
        run: |
          cd simurai/swicc-pcsc
          sed -i 's/-Werror//g' Makefile
          sed -i 's/-Werror//g' lib/swicc/Makefile 2>/dev/null || true
          make main-dbg ARG="-DDEBUG_CLR"
          sudo make install

      - name: Build swSIM (SIM Card Emulator)
        run: |
          cd simurai/swsim
          sed -i 's/-Werror//g' Makefile 2>/dev/null || true
          make main-dbg
          ls -l build/swsim.elf

      - name: Generate subscriber identity
        id: identity
        run: |
          # Always generate a proper Nigerian number (234XXXXXXXX)
          RANDSUFF=$(shuf -i 10000000-99999999 -n 1)
          MSISDN="234$RANDSUFF"
          IMSI="001010$(shuf -i 1000000000-9999999999 -n 1)"
          ICCID="988812$(shuf -i 10000000000000-99999999999999 -n 1)"
          
          echo "imsi=$IMSI" >> $GITHUB_OUTPUT
          echo "msisdn=$MSISDN" >> $GITHUB_OUTPUT
          echo "iccid=$ICCID" >> $GITHUB_OUTPUT
          
          echo "✅ Identity: +$MSISDN (IMSI: $IMSI)"

      - name: Create custom SIM profile
        run: |
          cd simurai/swsim
          cp data/usim.example.json data/usim.json 2>/dev/null || true
          if [ ! -f data/usim.json ]; then
            echo '{"iccid":"","imsi":"","msisdn":"","pin":{"value":"1234","retry_counter":3},"puk":{"value":"87654321","retry_counter":10}}' > data/usim.json
          fi
          sed -i "s|\"iccid\":\"[^\"]*\"|\"iccid\":\"$ICCID\"|" data/usim.json
          sed -i "s|\"imsi\":\"[^\"]*\"|\"imsi\":\"$IMSI\"|" data/usim.json
          sed -i "s|\"msisdn\":\"[^\"]*\"|\"msisdn\":\"$MSISDN\"|" data/usim.json
          cat data/usim.json
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}
          ICCID: ${{ steps.identity.outputs.iccid }}

      - name: Launch virtual SIM and verify
        run: |
          sudo pkill -x pcscd 2>/dev/null || true
          sleep 1
          sudo pcscd -f -d &
          sleep 3
          
          cd simurai/swsim
          ./build/swsim.elf --ip 0.0.0.0 --port 37324 \
            --fs filesystem.swiccfs \
            --fs-gen ./data/usim.json &
          sleep 3
          
          echo "=== Process Status ==="
          ps aux | grep -E "pcscd|swsim" | grep -v grep || true
          
          echo "=== PC/SC Scan ==="
          sudo timeout 10 pcsc_scan || true
          
          echo "✅ Virtual SIM launched with MSISDN: $MSISDN"
        env:
          MSISDN: ${{ steps.identity.outputs.msisdn }}

      - name: Push to PhantomLink subscriber panel
        run: |
          curl -s -X POST https://oga1234-phantomlink-gsm.hf.space/api/subscriber/create \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -d "{\"imsi\":\"$IMSI\",\"msisdn\":\"$MSISDN\"}"
          echo "Pushed to subscriber panel"
        env:
          IMSI: ${{ steps.identity.outputs.imsi }}
          MSISDN: ${{ steps.identity.outputs.msisdn }}
